name: Fetch ARSO radar frames

on:
  # Two schedules 90 minutes apart, alternating, is the standard trick for
  # a clean "every 90 minutes" cadence in cron (a single expression can't
  # express a 90-minute period since it doesn't divide an hour evenly).
  # Together these fire at :00 every 3rd hour and :30 on the hours between,
  # i.e. 00:00, 01:30, 03:00, 04:30, ... every 90 minutes, all day.
  #
  # Why 90 minutes is fine here: the GIF holds 23 frames at 5-minute
  # spacing, i.e. ~110 minutes of coverage per fetch -- about 20 minutes
  # more than the gap between runs. Combined with the unchanged-file retry
  # loop inside fetch_and_process.py, that's enough slack to absorb normal
  # GitHub Actions scheduling jitter without losing frames. If you want
  # extra margin anyway (e.g. because your repo is on a very busy runner
  # queue), switch to hourly by replacing both lines below with a single
  # `- cron: "5 * * * *"`.
  schedule:
    - cron: "0 0,3,6,9,12,15,18,21 * * *"
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

concurrency:
  group: fetch-radar
  cancel-in-progress: false # queue instead of overlapping; a run can take up to ~15 min via its own retry loop

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install tesseract
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch + process
        run: python scripts/fetch_and_process.py

      - name: Commit new frames, if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "radar: add new frame(s) [skip ci]"
          file_pattern: "data/**"
          commit_user_name: "radar-bot"
          commit_user_email: "actions@users.noreply.github.com"
