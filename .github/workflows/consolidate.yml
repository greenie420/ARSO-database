name: Consolidate previous day (optional)

# This workflow is entirely optional -- see scripts/consolidate_day.py for
# the rationale. Delete this file if you'd rather keep every frame as a
# loose WebP forever (simpler, more storage, fully browsable by URL).
#
# Runs once a day, well after midnight UTC, so "yesterday" is fully closed
# out and fetch_and_process.py is done appending to it.

on:
  schedule:
    - cron: "0 3 * * *" # 3:00 UTC daily
    timezone: "Europe/Ljubljana"
  workflow_dispatch:
    inputs:
      date:  # kept for future use if you want to target a specific day
        description: "Not used – always processes all new frames"
        required: false

concurrency:
  group: fetch-radar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  consolidate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Consolidate animation
        run: python scripts/consolidate_day.py

      - name: Commit updated animation & state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "radar: daily animation update [skip ci]"
          file_pattern: |
            data/animation/**
            data/state/**
          commit_user_name: "radar-bot"
          commit_user_email: "actions@users.noreply.github.com"
