name: Fetch ARSO radar frames

on:
  schedule:
    # Every 15 minutes
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

concurrency:
  group: fetch-radar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install tesseract
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tesseract-ocr

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch + process
        run: python scripts/fetch_and_process.py

      - name: Commit new frames, if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "radar: add new frame(s) [skip ci]"
          file_pattern: "data/**"
          commit_user_name: "radar-bot"
          commit_user_email: "actions@users.noreply.github.com"